<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h2>Login to Your Account</h2>
        
        <!-- The Invisible Alert Box -->
        <div id="alertBox" class="alert-box"></div>

        <form action="/login" method="POST">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <p>You don't have an account? <a href="/signup">Sign Up</a></p>
    </div>

    <!-- The Frontend Logic -->
    <script>
        // 1. Grab the exact URL the user is currently on
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Link our JavaScript to the invisible HTML box
        const alertBox = document.getElementById('alertBox');

        // 3. Check the URL for specific secret words and change the box accordingly
        if (urlParams.get('error') === 'notfound') {
            alertBox.style.display = 'block'; // Makes the box visible
            alertBox.classList.add('alert-error'); // Makes it red
            alertBox.textContent = 'ERROR: This username does not exist.';
        } 
        else if (urlParams.get('error') === 'wrongpassword') {
            alertBox.style.display = 'block';
            alertBox.classList.add('alert-error');
            alertBox.textContent = 'ERROR: Incorrect password. Try again.';
        }
        else if (urlParams.get('message') === 'registered') {
            alertBox.style.display = 'block';
            alertBox.classList.add('alert-success'); // Makes it green
            alertBox.textContent = 'SUCCESS: Account created! Please log in.';
        }
    </script>
</body>
</html>
