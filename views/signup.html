<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h2>Create a New Account</h2>
        
        <!-- The Invisible Alert Box -->
        <div id="alertBox" class="alert-box"></div>

        <form action="/signup" method="POST">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="email" id="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="/">Log In</a></p>
    </div>

    <!-- The Frontend Logic -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const alertBox = document.getElementById('alertBox');

        if (urlParams.get('error') === 'exists') {
            alertBox.style.display = 'block'; // Makes the box visible
            alertBox.classList.add('alert-error'); // Makes it red
            alertBox.textContent = 'ERROR: That username or email is already taken.';
        }
    </script>
</body>
</html>
